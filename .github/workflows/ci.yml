name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web:
    name: Web
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint web
        run: npm run lint:web

      - name: Build web
        run: npm run build:web

      - name: Validate frontend security guardrails
        run: npm run security:web

      - name: Validate W3C and accessibility
        run: |
          npm run dev:web -- --host 127.0.0.1 > /tmp/solane-run-vite.log 2>&1 &
          npm --workspace apps/web exec wait-on http://127.0.0.1:5173
          npm run w3c:web
