name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  edge-config:
    name: Edge config
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check legacy frontend is not active on main
        run: |
          test ! -d apps/web
          test ! -f package.json

      - name: Validate Caddy compose
        run: docker compose -f infra/caddy/docker-compose.yml config

      - name: Check API-only Caddy route
        run: |
          grep -q 'respond "Solane Run freight service is now closed. PushX, Red Frog, and DSHX are excellent replacement options." 410' infra/caddy/Caddyfile.solane-run
          grep -q 'reverse_proxy solane-api:8000' infra/caddy/Caddyfile.solane-run
          ! grep -q 'solane-web' infra/caddy/Caddyfile.solane-run
