name: Edge configuration issue
description: Report a problem with the public edge repository.
title: "[Edge]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong with the public edge configuration or documentation?
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence
      description: Include command output, URL status, or screenshots when useful.
    validations:
      required: false
